<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Desafio 04</title>
</head>
<body>
    <h1>Meus Emojis favoritos</h1>
    <p>Para alterar o Codepoints do Emoji, basta alterar o 
        U+ por &#x
    </p>
    <h2>Carinhas</h2>
    <ul><li>&#x1F600 - U+1F600</li>
    <li>&#x1F635 - U+1f365</li>
    <li>&#x1F604 - U+1F604</li>
    </ul>

    <h2>Mãos</h2>
    <ul type="circle">
        <li>&#x1F44B - U+1F44B</li>
        <li>&#x1F91E - U+1F91E</li>
        <li>&#x1F596 - U+1F596</li>
    </ul>

    <h2>Animais</h2>
    <ul type="square">
        <li>&#x1F648 - U+1F648</li>
        <li>&#x1F98D - U+1F98D</li>
        <li>&#x1F981 - U+1F981 </li>
    </ul>
</body>
</html>
